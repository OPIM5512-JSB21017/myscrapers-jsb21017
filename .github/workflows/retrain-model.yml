name: Retrain A08 Model

on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *'   # runs once daily at 13:00 UTC

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib scikit-learn jupyter nbconvert ipykernel

      - name: Run modeling notebook
        run: |
          jupyter nbconvert --to notebook --execute notebooks/A08_modeling.ipynb --output A08_modeling_ran.ipynb

      - name: Run trending notebook
        run: |
          jupyter nbconvert --to notebook --execute notebooks/A08_model_trending.ipynb --output A08_model_trending_ran.ipynb

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/ notebooks/
          git diff --cached --quiet || git commit -m "Auto-update model artifacts"
          git push